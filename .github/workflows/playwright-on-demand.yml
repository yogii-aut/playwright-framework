name: Playwright On Demand

on:
  workflow_dispatch:
    inputs:
      test_env:
        description: Runtime environment file to use
        required: true
        default: qa
        type: choice
        options:
          - local
          - qa
          - prod
      suite:
        description: Suite or group to execute
        required: true
        default: ui
        type: choice
        options:
          - ui
          - smoke
          - sanity
          - regression
          - service
          - full
      browser:
        description: Browser for UI execution
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      log_level:
        description: Framework log level
        required: true
        default: info
        type: choice
        options:
          - info
          - debug
          - trace
      publish_to_github_pages:
        description: Publish the single-file Allure report to GitHub Pages
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright:
    name: Run ${{ github.event.inputs.suite }} suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"
      TEST_ENV: ${{ github.event.inputs.test_env }}
      LOG_LEVEL: ${{ github.event.inputs.log_level }}
      INPUT_SUITE: ${{ github.event.inputs.suite }}
      INPUT_BROWSER: ${{ github.event.inputs.browser }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Execute selected suite
        shell: bash
        run: |
          case "${INPUT_SUITE}" in
            ui)
              env="${TEST_ENV}" npx playwright test --project="${INPUT_BROWSER}"
              ;;
            smoke)
              env="${TEST_ENV}" npm run test:smoke -- --project="${INPUT_BROWSER}"
              ;;
            sanity)
              env="${TEST_ENV}" npm run test:sanity -- --project="${INPUT_BROWSER}"
              ;;
            regression)
              env="${TEST_ENV}" npm run test:regression -- --project="${INPUT_BROWSER}"
              ;;
            service)
              env="${TEST_ENV}" npm run test:service
              ;;
            full)
              env="${TEST_ENV}" npm run test:full
              ;;
            *)
              echo "Unsupported suite selection: ${INPUT_SUITE}"
              exit 1
              ;;
          esac

      - name: Generate downloadable Allure HTML report
        if: always()
        shell: bash
        run: |
          if [ -d report/allure-results ] && find report/allure-results -type f | grep -q .; then
            npm run report:allure:generate
            npm run report:allure:generate:single
            mkdir -p github-pages
            cp report/allure-report-single/index.html github-pages/index.html
            cd report
            zip -r allure-report-html.zip allure-report >/dev/null
            zip -r allure-report-single-html.zip allure-report-single >/dev/null
          else
            echo "No Allure results found. Skipping HTML report generation."
          fi

      - name: Configure GitHub Pages
        if: ${{ always() && github.event.inputs.publish_to_github_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ always() && github.event.inputs.publish_to_github_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages

      - name: Upload Playwright and test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            report/playwright-report
            report/test-results
            report/allure-results
            report/allure-report
            report/allure-report-single
            report/allure-report-html.zip
            report/allure-report-single-html.zip

  publish-allure-pages:
    name: Publish Allure To GitHub Pages
    if: ${{ github.event.inputs.publish_to_github_pages == 'true' }}
    needs: playwright
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
